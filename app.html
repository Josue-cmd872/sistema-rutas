<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Catalans Store — Iniciar sesión</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f0ede8;--surface:#fff;--accent:#185FA5;--accent-dark:#0e4a85;
    --text:#1a1a1a;--muted:#6b6b6b;--border:rgba(0,0,0,0.12);
    --red:#A32D2D;--radius:12px
  }
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:var(--surface);border-radius:20px;padding:40px 36px;
    width:100%;max-width:380px;box-shadow:0 4px 40px rgba(0,0,0,.10)}
  .logo{text-align:center;margin-bottom:32px}
  .logo-icon{width:60px;height:60px;background:var(--accent);border-radius:16px;
    display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px}
  .logo h1{font-size:21px;font-weight:700;letter-spacing:-.5px}
  .logo p{font-size:13px;color:var(--muted);margin-top:4px}
  label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px}
  .field{margin-bottom:16px}
  input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);
    font-size:15px;color:var(--text);background:#fafafa;outline:none;
    transition:border-color .15s,box-shadow .15s;font-family:inherit}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.10);background:#fff}
  .btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;
    border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;
    transition:background .15s,transform .1s;font-family:inherit}
  .btn:hover{background:var(--accent-dark)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .error{background:#FCEBEB;color:var(--red);border:1px solid #F7C1C1;
    border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-top:14px;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
    margin-right:8px;vertical-align:middle}
  .hints{margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border)}
  .hints-title{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
  .hint-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:var(--bg);margin-bottom:5px}
  .hint-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .hint-info{font-size:11px;color:var(--muted)}
  .hint-info strong{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon" id="logo-icon">🐓</div>
    <h1>Catalans Store</h1>
    <p id="logo-sub">Sistema de rutas y ventas</p>
  </div>

  <div class="field">
    <label for="username">Usuario</label>
    <input type="text" id="username" autocomplete="username" placeholder="Ingresa tu usuario"
      oninput="updateHint(this.value)"/>
  </div>
  <div class="field">
    <label for="password">Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Iniciar sesión</button>
  <div class="error" id="err"></div>

  <div class="hints">
    <div class="hints-title">Usuarios disponibles</div>
    <div class="hint-row">
      <div class="hint-dot" style="background:#854F0B"></div>
      <div class="hint-info"><strong>catalans store</strong> — Administrador (todas las rutas)</div>
    </div>
    <div class="hint-row">
      <div class="hint-dot" style="background:#185FA5"></div>
      <div class="hint-info"><strong>boca del monte</strong> — Ruta Boca del Monte</div>
    </div>
    <div class="hint-row">
      <div class="hint-dot" style="background:#3B6D11"></div>
      <div class="hint-info"><strong>santa fe</strong> — Ruta Santa Fe</div>
    </div>
  </div>
</div>

<script>
  const colors = {
    'catalans store': '#854F0B',
    'boca del monte': '#185FA5',
    'santa fe':       '#3B6D11'
  };

  function updateHint(val) {
    const c = colors[val.trim().toLowerCase()];
    const icon = document.getElementById('logo-icon');
    if (c) {
      icon.style.background = c;
      icon.style.transform  = 'scale(1.05)';
    } else {
      icon.style.background = '#185FA5';
      icon.style.transform  = '';
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn  = document.getElementById('btn-login');
    const err  = document.getElementById('err');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if (!user || !pass) { showErr('Ingresa usuario y contraseña'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';
    err.style.display = 'none';

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.ok) { window.location.href = '/'; }
      else showErr(data.error || 'Error al iniciar sesión');
    } catch(e) {
      showErr('Error de conexión. Intenta de nuevo.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent    = msg;
    el.style.display  = 'block';
  }
</script>
</body>
</html>
